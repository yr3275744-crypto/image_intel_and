<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Intel - מודיעין חזותי</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --border-color: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.8em;
            margin-bottom: 10px;
            margin-top: 0;
            letter-spacing: 2px;
        }

        p {
            color: #94a3b8;
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        .path-input {
            width: 100%;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .path-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: rgba(255, 255, 255, 0.08);
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #cbd5e1;
        }

        /* סגנון למסך טעינה */
        #loader {
            display: none;
            margin-top: 20px;
            color: var(--accent-color);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Image Intel</h1>
        <p>מערכת סריקה וניתוח נתוני EXIF</p>

        <form action="/analyze" method="POST" id="analysisForm">
            <div class="input-group">
                <label for="images">הזן נתיב מלא לתיקיית התמונות:</label>
                <input type="text" 
                       name="images" 
                       id="images" 
                       class="path-input" 
                       placeholder="/path/to/your/images"
                       required>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">התחל ניתוח מודיעיני</button>
            <div id="loader">התהליך עלול לקחת מספר שניות... מנתח נתונים ⏳</div>
        </form>
    </div>

    <script>
        // הצגת מסך טעינה בעת שליחת הטופס
        document.getElementById('analysisForm').addEventListener('submit', function() {
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
        });
    </script>
</body>
</html>
